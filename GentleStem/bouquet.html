<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blush Garden Bouquet</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#1e1e1e;
font-family:'Inter',sans-serif;
padding:40px 20px;
}

.page{
background:#f7ebe7;
padding-bottom:70px;
max-width:1300px;
margin:auto;
}

.title{
background:#c70057;
padding:30px;
text-align:center;
}

.title h1{
font-family:'Cormorant Garamond',serif;
font-size:70px;
color:white;
font-weight:500;
letter-spacing:1px;
}

.products{
display:flex;
justify-content:center;
gap:45px;
padding:60px 40px;
flex-wrap:wrap;
}

.card{
width:260px;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
}

.image-box{
background:linear-gradient(
180deg,
#deb4c5,
#d9b7c0
);

padding:20px;
}

.image-box img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

.name{
font-family:'Cormorant Garamond',serif;
font-size:28px;
color:white;
margin-bottom:15px;
line-height:1.1;
}

.price{
text-align:center;
margin-top:20px;
font-size:26px;
font-family:'Cormorant Garamond',serif;
color:#c70057;
}

.back-container{
display:flex;
justify-content:center;
margin-top:10px;
}

.back{
text-decoration:none;
padding:14px 38px;
border:1px solid #c70057;
color:#c70057;
font-size:15px;
letter-spacing:1px;
transition:0.3s;
background:white;
}

.back:hover{
background:#c70057;
color:white;
}

@media(max-width:900px){

.title h1{
font-size:48px;
}

.products{
padding:40px 20px;
gap:30px;
}

.card{
width:100%;
max-width:320px;
}

}

</style>
</head>

<body>

<section class="page">

<div class="title">
<h1>Blush Garden Bouquet</h1>
</div>

<div class="products">

<div class="card">

<div class="image-box">

<div class="name">
Royal Mauve
</div>

<img src="GardenBouquet1.jpg">

</div>

<div class="price">
1.800.000
</div>

</div>

<div class="card">

<div class="image-box">

<div class="name">
Whimsicial Grace
</div>

<img src="GardenBouquet2.jpg">

</div>

<div class="price">
1.500.000
</div>

</div>

<div class="card">

<div class="image-box">

<div class="name">
Blushing Lily
</div>

<img src="Gardenbouquet3.jpg">

</div>

<div class="price">
1.300.000
</div>

</div>

</div>

<div class="back-container">

<a href="index.html" class="back">
← Back To Catalog
</a>

</div>

</section>

</body>
</html>
