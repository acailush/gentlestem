<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gentel Stem Catalog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#1e1e1e;
      font-family:'Inter',sans-serif;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px 20px;
    }

    .catalog-page{
      width:100%;
      max-width:1100px;

      padding:70px 60px;

      background:linear-gradient(
        90deg,
        #b7b087 0%,
        #e8c8d4 100%
      );
    }

    .catalog-title{
      text-align:center;

      font-family:'Cormorant Garamond',serif;

      font-size:72px;

      color:white;

      margin-bottom:60px;

      letter-spacing:2px;
    }

    .catalog-container{
      display:flex;

      justify-content:center;

      gap:55px;

      flex-wrap:wrap;
    }

    .catalog-card{
      width:220px;

      background:#f7e3df;

      padding:18px;

      text-align:center;

      text-decoration:none;

      transition:0.3s;
    }

    .catalog-card:hover{
      transform:translateY(-8px);
    }

    .catalog-card img{
      width:100%;

      height:300px;

      object-fit:cover;

      display:block;
    }

    .catalog-card h3{
      margin-top:18px;

      font-size:24px;

      line-height:1.2;

      font-family:'Cormorant Garamond',serif;

      color:#c04d72;

      font-weight:500;
    }

    @media(max-width:900px){

      .catalog-page{
        padding:50px 25px;
      }

      .catalog-title{
        font-size:50px;
      }

      .catalog-container{
        gap:35px;
      }

      .catalog-card{
        width:100%;
        max-width:300px;
      }

    }

  </style>
</head>

<body>

  <section class="catalog-page">

    <h1 class="catalog-title">
      KATALOG
    </h1>

    <div class="catalog-container">

      <!-- Bouquet -->

      <a href="bouquet.html" class="catalog-card">

        <img src="Katalog1.jpg" alt="Blush Garden Bouquet">

        <h3>
          Blush Garden Bouquet
        </h3>

      </a>

      <!-- Ethereal -->

      <a href="ethereal.html" class="catalog-card">

        <img src="orangpakairok.jpg" alt="Ethereal Garden">

        <h3>
          Ethereal Garden
        </h3>

      </a>

      <!-- Carryall -->

      <a href="carryall.html" class="catalog-card">

        <img src="CarryallSeries.jpg" alt="The Botanical Carryall">

        <h3>
          The Botanical Carryall
        </h3>

      </a>

    </div>

  </section>

</body>
</html>
